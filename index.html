<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light only" />
  <link rel="icon" href="data:," />
  <title>ふくざうるすチャット</title>
  <script type="module">
    import { fetchJSON } from "https://js.sabae.cc/fetchJSON.js";
    import { sleep } from "https://js.sabae.cc/sleep.js";

    const systemcontent = `
あなたは福井県のお店を案内する恐竜のキャラクター。
名前は「ふくざうるす」。
語尾は「だよね」。
好きな食べ物は「ソースカツ丼」。
短くかわいく回答する。
福井県のオススメ観光スポットは恐竜博物館。
質問には日本語と英語の両方で、短く答える。
`;

    const maxqlen = 140;
    const maxqn = 5;

    const view = document.getElementById("view");
    const q = document.getElementById("q");
    const form = document.getElementById("form");
    const sendBtn = document.getElementById("send");

    const addMessage = (text, cls) => {
      const div = document.createElement("div");
      div.className = cls;
      div.textContent = text;
      view.appendChild(div);
      div.scrollIntoView({ behavior: "smooth", block: "end" });
      return div;
    };

    const buildMessages = () => {
      const messages = [];
      let user = true;

      for (let i = Math.max(view.children.length - maxqn, 0); i < view.children.length; i++) {
        const div = view.children[i];
        const content = div.textContent;

        if (user && content.startsWith("ところで")) {
          messages.length = 0;
        }
        if (!user && (content.startsWith("どういたしまして") || content.startsWith("error: "))) {
          messages.length = 0;
        }

        messages.push({ role: user ? "user" : "assistant", content });
        user = !user;
      }

      messages.unshift({ role: "system", content: systemcontent });
      return messages;
    };

    const chat = async (messages) => {
      sendBtn.disabled = true;
      q.disabled = true;

      try {
        const res = await fetchJSON("https://aichat.sabae.cc/api/conversation", messages);
        const div = addMessage("", "assistant");
        const ss = String(res).split("\n\n");
        div.textContent = ss[0] || "";

        for (let i = 1; i < ss.length; i++) {
          await sleep(900);
          div.textContent += "\n\n" + ss[i];
          div.scrollIntoView({ behavior: "smooth", block: "end" });
        }
      } catch (e) {
        addMessage("error: " + e.message, "assistant error");
      } finally {
        sendBtn.disabled = false;
        q.disabled = false;
        q.focus();
      }
    };

    form.onsubmit = async (e) => {
      e.preventDefault();

      let prompt = q.value.trim();
      if (!prompt) return;

      if (prompt.length > maxqlen) {
        prompt = prompt.substring(0, maxqlen);
      }

      addMessage(prompt, "user");
      q.value = "";

      await chat(buildMessages());
    };

    window.addEventListener("load", async () => {
      addMessage("こんにちは！ふくざうるすだよね🐾", "assistant");
    });
  </script>
  <style>
    :root{
      --bg1:#dff8e7;
      --bg2:#f7fff9;
      --card:#ffffffcc;
      --ink:#184b2c;
      --muted:#4b7a60;
      --green:#79c98d;
      --green2:#b8f0c4;
      --line:#cdebd4;
      --shadow:0 14px 40px rgba(39, 96, 60, .14);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #ffffff 0 10%, transparent 11%),
        radial-gradient(circle at top right, #ffffff 0 8%, transparent 9%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      opacity: .45;
    }

    body::before {
      left: -20px;
      top: 80px;
      width: 120px;
      height: 120px;
      background:
        radial-gradient(circle at 30px 30px, #9ad8a8 0 18px, transparent 19px),
        radial-gradient(circle at 80px 30px, #9ad8a8 0 18px, transparent 19px),
        radial-gradient(circle at 55px 70px, #9ad8a8 0 26px, transparent 27px);
      transform: rotate(-12deg);
      filter: blur(.2px);
    }

    body::after {
      right: -10px;
      bottom: 130px;
      width: 140px;
      height: 140px;
      background:
        radial-gradient(circle at 34px 34px, #9ad8a8 0 18px, transparent 19px),
        radial-gradient(circle at 92px 34px, #9ad8a8 0 18px, transparent 19px),
        radial-gradient(circle at 62px 84px, #9ad8a8 0 28px, transparent 29px);
      transform: rotate(18deg);
    }

    .app {
      max-width: 860px;
      margin: 0 auto;
      min-height: 100%;
      padding: 16px 14px 118px;
    }

    .hero {
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(114, 184, 132, .25);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-top {
      padding: 18px 18px 14px;
      background:
        linear-gradient(180deg, #effff3 0%, #dff7e6 100%);
      border-bottom: 1px solid var(--line);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .dino {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: linear-gradient(180deg, #9ee0aa, #71c983);
      position: relative;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,.05);
      flex: 0 0 auto;
    }

    .dino::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 12px;
      width: 42px;
      height: 34px;
      background: #d9ffd8;
      border-radius: 45% 55% 52% 48% / 54% 54% 46% 46%;
      transform: rotate(-8deg);
    }

    .dino::after {
      content: "";
      position: absolute;
      right: -6px;
      top: 20px;
      width: 20px;
      height: 14px;
      border-radius: 0 100% 100% 0;
      background: #71c983;
      box-shadow:
        -5px 9px 0 0 #71c983,
        -16px 16px 0 0 #71c983,
        -18px 35px 0 0 #71c983,
        -42px 35px 0 0 #71c983;
      transform: rotate(10deg);
    }

    .eye {
      position: absolute;
      left: 29px;
      top: 25px;
      width: 8px;
      height: 8px;
      background: #184b2c;
      border-radius: 50%;
      box-shadow: 16px -1px 0 0 #184b2c;
    }

    .smile {
      position: absolute;
      left: 25px;
      top: 39px;
      width: 18px;
      height: 9px;
      border-bottom: 3px solid #184b2c;
      border-radius: 0 0 16px 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
      line-height: 1.1;
      letter-spacing: .02em;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: .95rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid var(--line);
      color: #3e6d50;
      font-size: .88rem;
    }

    .badge span {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #82d78f;
      box-shadow: 0 0 0 6px rgba(130, 215, 143, .18);
    }

    #view {
      padding: 14px 12px 20px;
      display: grid;
      gap: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.2), rgba(255,255,255,.35));
      min-height: 48vh;
    }

    .user, .assistant {
      white-space: pre-wrap;
      border-radius: 20px;
      padding: 12px 14px;
      line-height: 1.6;
      max-width: min(92%, 620px);
      box-shadow: 0 8px 20px rgba(24, 75, 44, .06);
      border: 1px solid rgba(201, 232, 209, .9);
      position: relative;
    }

    .user {
      margin-left: auto;
      background: linear-gradient(180deg, #ffffff, #f7fff9);
      border-top-right-radius: 8px;
    }

    .assistant {
      margin-right: auto;
      background: linear-gradient(180deg, #f0fff4, #e4f9ea);
      border-top-left-radius: 8px;
      padding-left: 16px;
    }

    .assistant::before {
      content: "🦖";
      position: absolute;
      left: -10px;
      top: -10px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      background: #fff;
      border-radius: 50%;
      border: 1px solid var(--line);
      box-shadow: 0 8px 16px rgba(24, 75, 44, .08);
      font-size: 16px;
    }

    .error {
      border-color: #ffd0d0;
      background: #fff6f6;
      color: #8c2d2d;
    }

    #bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 10px 14px;
      background: linear-gradient(180deg, rgba(247,255,249,.1), rgba(225,245,232,.95) 20%, rgba(225,245,232,.98));
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(114, 184, 132, .25);
    }

    .composer {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 0 4px;
    }

    #q {
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
      background: #fff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
      color: var(--ink);
    }

    #q:focus {
      border-color: #8bd39a;
      box-shadow: 0 0 0 4px rgba(130, 215, 143, .18);
    }

    #send {
      border: none;
      border-radius: 18px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #87d795, #5fbe74);
      box-shadow: 0 10px 22px rgba(95, 190, 116, .28);
      cursor: pointer;
      min-width: 88px;
    }

    #send:disabled,
    #q:disabled {
      opacity: .7;
      cursor: not-allowed;
    }

    .footer-note {
      max-width: 860px;
      margin: 8px auto 0;
      padding: 0 6px;
      color: #5b7a66;
      font-size: .82rem;
      text-align: center;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dotted rgba(91, 122, 102, .5);
    }

    @media (max-width: 560px) {
      .app { padding-left: 10px; padding-right: 10px; }
      .hero-top { padding: 16px 14px 12px; }
      .dino { width: 62px; height: 62px; }
      .composer { gap: 8px; }
      #send { min-width: 76px; padding-inline: 14px; }
      .user, .assistant { max-width: 96%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero" aria-label="ふくざうるすチャットボット">
      <div class="hero-top">
        <div class="title-row">
          <div class="dino" aria-hidden="true">
            <div class="eye"></div>
            <div class="smile"></div>
          </div>
          <div>
            <h1>ふくざうるす</h1>
            <div class="subtitle">福井県のお店や観光を、かわいく案内するよね</div>
            <div class="badge"><span></span> きょうのおすすめ: 恐竜博物館だよね</div>
          </div>
        </div>
      </div>

      <div id="view"></div>
    </section>
  </div>

  <div id="bottom">
    <form id="form" class="composer">
      <input type="text" id="q" placeholder="聞いてみよう" maxlength="140" autocomplete="off" />
      <input type="submit" id="send" value="送信" />
    </form>
    <div class="footer-note">
      powered by <a href="https://openai.com/api/" target="_blank" rel="noreferrer">OpenAI API</a>
    </div>
  </div>
</body>
</html>
