<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT風UI - Streaming版</title>
  <style>
    :root{
      --bg:#f7f7f8;
      --panel:#ffffff;
      --sidebar:#202123;
      --sidebar2:#2a2b32;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --accent:#10a37f;
      --accent-2:#0d8f6f;
      --user:#eef2ff;
      --assistant:#ffffff;
      --shadow:0 10px 30px rgba(0,0,0,.06);
      --shadow-soft:0 4px 16px rgba(0,0,0,.05);
    }

    *{box-sizing:border-box}
    html,body{
      height:100%;
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    body{
      display:flex;
      overflow:hidden;
    }

    .sidebar{
      width:280px;
      background:var(--sidebar);
      color:#fff;
      display:flex;
      flex-direction:column;
      padding:16px;
      gap:12px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
      font-size:16px;
      padding:10px 12px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
    }
    .brand-dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 0 4px rgba(16,163,127,.15);
    }
    .newchat{
      border:none;
      background:#fff;
      color:#111;
      padding:12px 14px;
      border-radius:12px;
      font-weight:600;
      cursor:pointer;
      transition:.15s ease;
    }
    .newchat:hover{opacity:.92; transform:translateY(-1px)}
    .history{
      flex:1;
      overflow:auto;
      padding-right:4px;
    }
    .history-item{
      padding:12px 14px;
      border-radius:10px;
      color:#e5e7eb;
      background:transparent;
      cursor:pointer;
      margin-bottom:6px;
      font-size:14px;
      transition:.15s ease;
    }
    .history-item:hover{background:rgba(255,255,255,.07)}
    .sidebar-footer{
      padding:12px 14px;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      color:#d1d5db;
      font-size:13px;
      line-height:1.5;
    }

    .main{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0;
    }

    .topbar{
      height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      background:rgba(255,255,255,.8);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
    }
    .topbar h1{
      margin:0;
      font-size:16px;
      font-weight:700;
    }
    .pill{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      color:#374151;
      background:#fff;
      border:1px solid var(--border);
      padding:8px 12px;
      border-radius:999px;
    }
    .pill-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--accent);
      box-shadow:0 0 0 3px rgba(16,163,127,.12);
    }

    .chat{
      flex:1;
      overflow:auto;
      padding:24px 16px 140px;
      scroll-behavior:smooth;
    }
    .chat-inner{
      max-width:900px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .message{
      display:flex;
      gap:12px;
      align-items:flex-start;
    }
    .message.user{
      flex-direction:row-reverse;
    }
    .message.user .bubble-wrap{
      align-items:flex-end;
    }

    .avatar{
      width:36px;
      height:36px;
      border-radius:10px;
      flex:0 0 auto;
      overflow:hidden;
      border:1px solid var(--border);
      box-shadow:0 4px 14px rgba(0,0,0,.04);
      background:#fff;
      display:block;
    }
    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .bubble-wrap{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }
    .bubble-meta{
      font-size:12px;
      color:var(--muted);
      padding:0 2px;
    }
    .message.user .bubble-meta{
      text-align:right;
    }

    .bubble{
      max-width:min(760px, calc(100vw - 120px));
      padding:14px 16px;
      border-radius:16px;
      box-shadow:var(--shadow);
      border:1px solid var(--border);
      line-height:1.7;
      white-space:pre-wrap;
      word-break:break-word;
      position:relative;
    }
    .assistant .bubble{background:var(--assistant)}
    .user .bubble{background:var(--user)}
    .bubble.streaming::after{
      content:"";
      display:inline-block;
      width:8px;
      height:18px;
      margin-left:3px;
      vertical-align:-4px;
      background:rgba(16,163,127,.7);
      border-radius:2px;
      animation:blink 1s steps(1) infinite;
    }
    @keyframes blink{
      50%{opacity:0}
    }

    .typing{
      display:inline-flex;
      align-items:center;
      gap:5px;
      min-height:18px;
    }
    .typing span{
      width:7px;
      height:7px;
      border-radius:50%;
      background:#9ca3af;
      animation:dot 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2){animation-delay:.15s}
    .typing span:nth-child(3){animation-delay:.3s}
    @keyframes dot{
      0%,80%,100%{transform:translateY(0); opacity:.45}
      40%{transform:translateY(-4px); opacity:1}
    }

    .composer-wrap{
      position:fixed;
      left:280px;
      right:0;
      bottom:0;
      padding:18px 16px 20px;
      background:linear-gradient(to top, rgba(247,247,248,1) 70%, rgba(247,247,248,.85));
      border-top:1px solid rgba(229,231,235,.7);
    }
    .composer{
      max-width:900px;
      margin:0 auto;
      display:flex;
      gap:10px;
      align-items:flex-end;
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:10px;
      box-shadow:var(--shadow);
    }
    textarea{
      flex:1;
      resize:none;
      border:none;
      outline:none;
      font:inherit;
      line-height:1.6;
      padding:8px 10px;
      min-height:24px;
      max-height:180px;
      background:transparent;
    }
    .send{
      border:none;
      background:var(--accent);
      color:#fff;
      width:44px;
      height:44px;
      border-radius:14px;
      cursor:pointer;
      font-size:18px;
      flex:0 0 auto;
      transition:.15s ease;
    }
    .send:hover{background:var(--accent-2); transform:translateY(-1px)}
    .send:disabled{
      opacity:.45;
      cursor:not-allowed;
      transform:none;
    }

    .hint{
      max-width:900px;
      margin:8px auto 0;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }

    .status-line{
      max-width:900px;
      margin:0 auto 8px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
      min-height:18px;
    }

    @media (max-width: 860px){
      .sidebar{display:none}
      .composer-wrap{left:0}
      .bubble{max-width:calc(100vw - 92px)}
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-dot"></span>
      ChatGPT風UI
    </div>
    <button class="newchat" id="newChat">+ 新しいチャット</button>

    <div class="history" id="history">
      <div class="history-item">UX設計の相談</div>
      <div class="history-item">HTMLで画面を作る</div>
      <div class="history-item">アイデア整理</div>
      <div class="history-item">文章のたたき台</div>
    </div>

    <div class="sidebar-footer">
      これはデモです。<br />
      API接続は入っていますが、未設定ならローカルで擬似ストリーミングします。
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1>ChatGPT風チャット画面</h1>
      <div class="pill"><span class="pill-dot"></span><span>Streaming Demo</span></div>
    </header>

    <section class="chat" id="chat">
      <div class="chat-inner" id="chatInner"></div>
    </section>

    <div class="composer-wrap">
      <div class="status-line" id="statusLine"></div>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="メッセージを入力..."></textarea>
        <button class="send" id="sendBtn" aria-label="送信" disabled>➤</button>
      </div>
      <div class="hint">Enterで送信、Shift+Enterで改行</div>
    </div>
  </main>

  <script>
    const chatInner = document.getElementById('chatInner');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const chat = document.getElementById('chat');
    const newChat = document.getElementById('newChat');
    const statusLine = document.getElementById('statusLine');

    // 画像は同じフォルダに置くと扱いやすいです。人類は外部URLを信用しすぎるので。
    const AI_AVATAR_URL = 'https://static.vecteezy.com/system/resources/previews/021/608/790/non_2x/chatgpt-logo-chat-gpt-icon-on-black-background-free-vector.jpg';
    const USER_AVATAR_URL = 'https://www.hotosena.com/wp-content/uploads/2025/04/%E3%82%B9%E3%82%AF%E3%83%AA%E3%83%BC%E3%83%B3%E3%82%B7%E3%83%A7%E3%83%83%E3%83%88-752.jpg';

    // ここを自分のAPIに変えてください。
    // 例: '/api/chat'
    // 未設定なら、ローカルで擬似ストリーミング返信します。
    const API_URL = '/api/chat';

    let chatCount = 0;
    let activeAssistantMessageEl = null;
    let activeAssistantBubbleEl = null;
    let currentAbortController = null;

    function scrollToBottom() {
      chat.scrollTop = chat.scrollHeight;
    }

    function resizeTextarea() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 180) + 'px';
    }

    function setStatus(text) {
      statusLine.textContent = text || '';
    }

    function formatTime(date = new Date()) {
      return new Intl.DateTimeFormat('ja-JP', {
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    }

    function createAvatar(role) {
      const avatar = document.createElement('div');
      avatar.className = 'avatar';

      const img = document.createElement('img');
      img.alt = role === 'user' ? 'ユーザーアバター' : 'AIアバター';
      img.src = role === 'user' ? USER_AVATAR_URL : AI_AVATAR_URL;

      img.onerror = () => {
        avatar.innerHTML = '';
        avatar.style.display = 'grid';
        avatar.style.placeItems = 'center';
        avatar.style.fontWeight = '700';
        avatar.style.fontSize = '12px';
        avatar.style.color = role === 'user' ? '#4338ca' : '#10a37f';
        avatar.style.background = role === 'user' ? '#e0e7ff' : 'rgba(16,163,127,.12)';
        avatar.textContent = role === 'user' ? 'Me' : 'AI';
      };

      avatar.appendChild(img);
      return avatar;
    }

    function createMessageElement(role, text = '', options = {}) {
      const { streaming = false, typing = false, time = formatTime() } = options;

      const message = document.createElement('div');
      message.className = `message ${role}`;

      const avatar = createAvatar(role);

      const bubbleWrap = document.createElement('div');
      bubbleWrap.className = 'bubble-wrap';

      const meta = document.createElement('div');
      meta.className = 'bubble-meta';
      meta.textContent = role === 'user' ? `あなた · ${time}` : `AI · ${time}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (typing) {
        bubble.innerHTML = `
          <span class="typing" aria-label="入力中">
            <span></span><span></span><span></span>
          </span>
        `;
      } else {
        bubble.textContent = text;
      }

      if (streaming) bubble.classList.add('streaming');

      bubbleWrap.appendChild(meta);
      bubbleWrap.appendChild(bubble);

      if (role === 'user') {
        message.appendChild(bubbleWrap);
        message.appendChild(avatar);
      } else {
        message.appendChild(avatar);
        message.appendChild(bubbleWrap);
      }

      chatInner.appendChild(message);
      scrollToBottom();
      return { message, avatar, bubbleWrap, bubble, meta };
    }

    function addMessage(role, text, options = {}) {
      return createMessageElement(role, text, options);
    }

    function addTypingMessage() {
      return createMessageElement('assistant', '', { typing: true });
    }

    function removeElement(el) {
      if (el && el.parentNode) el.parentNode.removeChild(el);
    }

    function setBubbleText(bubbleEl, text) {
      bubbleEl.textContent = text;
      bubbleEl.classList.add('streaming');
      scrollToBottom();
    }

    function appendBubbleText(bubbleEl, text) {
      bubbleEl.textContent += text;
      bubbleEl.classList.add('streaming');
      scrollToBottom();
    }

    function finalizeBubble(bubbleEl) {
      bubbleEl.classList.remove('streaming');
    }

    function fakeReply(userText) {
      const pool = [
        'なるほど。見た目は大事です。中身がなくても、まず人間は見た目で判断しますから。',
        'いいですね。次はAPIをつなげれば、ちゃんと会話できる風になります。',
        'その要件なら、サイドバー、メッセージ一覧、入力欄があれば十分です。',
        'UIはそれっぽく、処理は軽く。実に健全です。',
        'ストリーミングは「少しずつ表示される」だけで、体験がかなり良くなります。人間は待たされるのが嫌いなので。'
      ];
      const base = pool[Math.floor(Math.random() * pool.length)];
      return `${base}\n\n受け取った内容: ${userText}`;
    }

    function streamTextToBubble(text, bubbleEl, onDone) {
      let i = 0;
      const speed = Math.max(12, Math.min(28, Math.floor(220 / Math.max(text.length / 4, 1))));
      const timer = setInterval(() => {
        const chunk = text[i];
        if (typeof chunk === 'undefined') {
          clearInterval(timer);
          finalizeBubble(bubbleEl);
          if (typeof onDone === 'function') onDone();
          return;
        }
        appendBubbleText(bubbleEl, chunk);
        i += 1;
      }, speed);

      return () => clearInterval(timer);
    }

    async function streamFromApi(userText, assistantBubbleEl) {
      const controller = new AbortController();
      currentAbortController = controller;

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: userText,
            stream: true
          }),
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        if (!response.body) {
          throw new Error('ReadableStreamが利用できません');
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let accumulated = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          accumulated += chunk;
          setBubbleText(assistantBubbleEl, accumulated);
        }

        finalizeBubble(assistantBubbleEl);
      } catch (error) {
        if (controller.signal.aborted) {
          setStatus('応答を中断しました');
          return;
        }
        throw error;
      } finally {
        currentAbortController = null;
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      if (currentAbortController) {
        currentAbortController.abort();
      }

      addMessage('user', text);
      input.value = '';
      resizeTextarea();
      sendBtn.disabled = true;

      setStatus('応答を生成中...');
      chatCount += 1;

      const typingEl = addTypingMessage();
      const userText = text;

      setTimeout(async () => {
        removeElement(typingEl.message);

        const assistantMsg = addMessage('assistant', '', { streaming: true });
        activeAssistantMessageEl = assistantMsg.message;
        activeAssistantBubbleEl = assistantMsg.bubble;

        try {
          // API_URL が空文字ならローカル擬似ストリーミング
          if (!API_URL || API_URL === '/api/chat') {
            // まずは実APIを試し、失敗したらローカルにフォールバック
            try {
              await streamFromApi(userText, assistantMsg.bubble);
              setStatus('');
              sendBtn.disabled = !input.value.trim();
              return;
            } catch (apiError) {
              const fallbackText = fakeReply(userText);
              streamTextToBubble(fallbackText, assistantMsg.bubble, () => {
                setStatus('');
                sendBtn.disabled = !input.value.trim();
              });
              return;
            }
          }

          const fallbackText = fakeReply(userText);
          streamTextToBubble(fallbackText, assistantMsg.bubble, () => {
            setStatus('');
            sendBtn.disabled = !input.value.trim();
          });
        } catch (err) {
          assistantMsg.bubble.textContent = 'エラーが発生しました。API接続を確認してください。';
          finalizeBubble(assistantMsg.bubble);
          setStatus('送信に失敗しました');
          sendBtn.disabled = !input.value.trim();
        }
      }, 500);
    }

    sendBtn.addEventListener('click', sendMessage);

    input.addEventListener('input', () => {
      resizeTextarea();
      sendBtn.disabled = !input.value.trim();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    newChat.addEventListener('click', () => {
      if (currentAbortController) currentAbortController.abort();
      chatInner.innerHTML = '';
      addMessage('assistant', '新しいチャットを開始しました。人類は毎回ここからやり直します。');
      setStatus('');
      sendBtn.disabled = !input.value.trim();
      activeAssistantMessageEl = null;
      activeAssistantBubbleEl = null;
    });

    // 初期メッセージ
    addMessage('assistant', 'こんにちは。アバター画像つきのチャット画面です。');
    addMessage('user', 'ストリーミング応答を追加したい。');
    addMessage('assistant', '了解。少しずつ返す版にしてあります。APIが未接続なら擬似ストリーミングで動きます。');

    resizeTextarea();
    scrollToBottom();
  </script>
</body>
</html>
